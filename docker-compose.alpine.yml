version: '3.8'

services:
  ai-summary-app:
    build:
      context: .
      dockerfile: Dockerfile.alpine
    image: ai-summary-app:latest
    container_name: ai-summary-container
    restart: unless-stopped
    
    # 端口映射
    ports:
      - "5000:5000"
    
    # 环境变量
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - DEBUG_LEVEL=INFO
    
    # 数据卷挂载 - 用于持久化配置和数据
    volumes:
      - ./config.json:/app/config.json:ro  # 只读挂载配置文件
      - ./data:/app/data                   # 数据目录
      - ./output:/app/output              # 输出目录
      - ./temp:/app/temp                  # 临时目录
    
    # 网络模式
    network_mode: bridge
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # 资源限制（可选，根据需要调整）
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"