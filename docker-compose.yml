version: '3.8'

services:
  ai-summary-app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: ai-summary-container
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./config.json:/app/config.json
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-summary-network

networks:
  ai-summary-network:
    driver: bridge
