services:
  ai-summary-app:
    build: .
    container_name: ai-summary-container
    ports:
      - "5000:5000"
    volumes:
      # 首次使用需创建: cp config.example.json config.json
      - ./config.json:/app/config.json
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
    environment:
      # 限制 Python 运行时内存分配，减少空闲占用
      - MALLOC_ARENA_MAX=2
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    restart: unless-stopped
