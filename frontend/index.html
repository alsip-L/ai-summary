<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Summary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/processing.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-title">
                <span class="icon">A</span>
                AI Summary
            </div>

            <div class="sidebar-scroll">
                <!-- Global message toast -->
                <div id="message" class="alert hidden"></div>

                <!-- Provider section (JS rendered) -->
                <div id="provider-section"></div>

                <div class="sidebar-divider"></div>

                <!-- Prompt section (JS rendered) -->
                <div id="prompt-section"></div>

                <div class="sidebar-divider"></div>

                <!-- Trash dropdown (hidden when empty, JS controlled) -->
                <div class="custom-dropdown hidden" id="trash-dropdown">
                    <div class="dropdown-selected" onclick="toggleDropdown('trash-dropdown')">
                        <span>回收站</span>
                        <span id="trash-count" class="results-count"></span>
                        <span class="dropdown-arrow">&#9662;</span>
                    </div>
                    <div class="dropdown-content trash-content-area" id="trash-options">
                        <div id="trash-section"></div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <!-- Empty state (shown when no task running) -->
            <div id="empty-state" class="main-content-empty">
                <div class="empty-icon">A</div>
                <button type="button" id="start-process-btn" class="btn btn-start-process">
                    开始处理
                </button>
                <div class="empty-text">
                    选择服务商、模型和目录后，开始批量处理
                </div>
            </div>

            <!-- Processing progress -->
            <div id="processing-progress" class="processing-status-panel hidden">
                <div class="progress-header">
                    <div class="progress-title">
                        <span class="status-icon" id="statusIcon"></span>
                        <span id="statusTitle">就绪</span>
                    </div>
                    <div class="progress-percentage" id="progressPercentage">0%</div>
                </div>
                <div class="progress-main">
                    <div class="progress-bar-wrapper">
                        <div id="progressBar" class="progress-bar-advanced">
                            <div class="progress-fill" id="progressFill"></div>
                            <div class="progress-glow"></div>
                        </div>
                    </div>
                    <div class="progress-details">
                        <div class="progress-stats">
                            <div class="stat-item">
                                <span class="stat-label">当前文件</span>
                                <span class="stat-value" id="currentFile">-</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">进度</span>
                                <span class="stat-value" id="progressFiles">0 / 0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">耗时</span>
                                <span class="stat-value" id="elapsedTime">0:00</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="progress-footer">
                    <div class="status-message" id="statusMessage">等待开始...</div>
                    <div class="progress-actions">
                        <button type="button" id="cancelProcessing" class="btn btn-sm btn-outline-danger hidden">
                            取消
                        </button>
                    </div>
                </div>
            </div>

            <!-- Results -->
            <div id="results-area" class="results-container hidden">
                <div class="results-header">
                    <span>处理结果</span>
                    <span id="results-count" class="results-count"></span>
                </div>
                <table id="results-table">
                    <thead>
                        <tr>
                            <th>源文件</th>
                            <th>输出</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Directory browser modal -->
    <div id="directory-browser-modal" class="modal-overlay hidden">
        <div class="modal-content directory-browser">
            <div class="modal-header">
                <h3>选择目录</h3>
                <button type="button" class="modal-close-btn" onclick="closeDirectoryBrowser()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="browser-toolbar">
                    <div class="current-path">
                        <span class="path-label">路径:</span>
                        <span id="browser-current-path" class="path-value">-</span>
                    </div>
                    <div class="browser-actions">
                        <button type="button" class="btn btn-sm btn-secondary hidden" id="browser-back-btn" onclick="goBack()">
                            返回
                        </button>
                        <button type="button" class="btn btn-sm btn-secondary" onclick="refreshDirectory()">
                            刷新
                        </button>
                    </div>
                </div>
                <div class="directory-list" id="directory-list"></div>
                <div class="direct-input-section">
                    <label for="direct-path-input">或输入路径:</label>
                    <input type="text" id="direct-path-input" placeholder="输入目录路径..." class="form-control">
                    <button type="button" class="btn btn-sm btn-primary" onclick="goToDirectPath()">前往</button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeDirectoryBrowser()">取消</button>
                <button type="button" class="btn btn-primary" id="select-directory-btn" onclick="selectDirectory()" disabled>选择</button>
            </div>
        </div>
    </div>

    <!-- JS (dependency order) -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/state.js"></script>
    <script src="/static/js/components/provider-panel.js"></script>
    <script src="/static/js/components/prompt-panel.js"></script>
    <script src="/static/js/components/task-progress.js"></script>
    <script src="/static/js/components/directory-browser.js"></script>
    <script src="/static/js/components/trash-panel.js"></script>
    <script src="/static/js/components/result-table.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
