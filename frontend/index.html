<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI批量总结助手</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/processing.css">
    <link rel="stylesheet" href="/static/css/themes.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>⚙️ 配置</h1>

            <!-- 配置自动保存提示 -->
            <div style="margin: 10px 0; padding: 8px; background-color: #e8f5e8; border: 1px solid #4CAF50; border-radius: 4px; font-size: 12px; color: #2E7D32;">
                ✅ 配置选择将自动保存到config.json
            </div>

            <hr style="margin: 10px 0; border-top: 1px solid #ddd;">

            <!-- 消息显示区域 -->
            <div id="message" class="alert" style="display: none;"></div>

            <!-- 提供商配置区域（由 JS 动态渲染） -->
            <div id="provider-section"></div>

            <hr>

            <!-- Prompt 管理区域（由 JS 动态渲染） -->
            <div id="prompt-section"></div>

            <hr style="margin: 15px 0; border-top: 1px solid #ddd;">

            <!-- 回收站 Dropdown -->
            <div class="custom-dropdown" id="trash-dropdown">
                <div class="dropdown-selected" onclick="toggleDropdown('trash-dropdown')">
                    <span>🗑️ 回收站</span>
                    <span class="dropdown-arrow">▼</span>
                </div>
                <div class="dropdown-content trash-content-area" id="trash-options" style="display: none; max-height: 300px; overflow-y: auto;">
                    <div id="trash-section"></div>
                </div>
            </div>

            <hr style="margin: 15px 0; border-top: 1px solid #ddd;">

            <!-- 系统设置 Dropdown -->
            <div class="custom-dropdown" id="system-settings-dropdown">
                <div class="dropdown-selected" onclick="toggleDropdown('system-settings-dropdown')">
                    <span>🔧 系统设置</span>
                    <span class="dropdown-arrow">▼</span>
                </div>
                <div class="dropdown-content system-settings-area" id="system-settings-content" style="display: none;">
                    <div id="settings-section"></div>
                </div>

                <!-- 主题切换 -->
                <div style="margin-top: 16px; padding-top: 12px; border-top: 1px solid #e0e0e0;">
                    <button type="button" id="themeToggle" class="btn btn-secondary" style="width: 100%; padding: 8px; font-size: 13px;">🌓 切换主题</button>
                </div>
            </div>

        </div> <!-- end sidebar -->

        <div class="main-content">
            <!-- 开始处理按钮 -->
            <div style="margin: 16px 0 24px 0; text-align: center; position: relative; z-index: 1000;">
                <button type="button" id="start-process-btn"
                        class="btn btn-start-process"
                        style="position: relative; z-index: 1001;">
                    <span style="font-size: 24px;">🚀</span>
                    <span>开始处理</span>
                </button>
            </div>

            <!-- 处理进度区域 -->
            <div id="processing-progress" class="processing-status-panel" style="display: none;">
                <div class="progress-header">
                    <div class="progress-title">
                        <span class="status-icon" id="statusIcon">⏳</span>
                        <span id="statusTitle">准备处理</span>
                    </div>
                    <div class="progress-percentage" id="progressPercentage">0%</div>
                </div>
                <div class="progress-main">
                    <div class="progress-bar-wrapper">
                        <div id="progressBar" class="progress-bar-advanced">
                            <div class="progress-fill" id="progressFill"></div>
                            <div class="progress-glow"></div>
                        </div>
                    </div>
                    <div class="progress-details">
                        <div class="progress-stats">
                            <div class="stat-item">
                                <span class="stat-label">当前文件:</span>
                                <span class="stat-value" id="currentFile">-</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">处理进度:</span>
                                <span class="stat-value" id="progressFiles">0 / 0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">耗时:</span>
                                <span class="stat-value" id="elapsedTime">00:00</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="progress-footer">
                    <div class="status-message" id="statusMessage">等待开始处理...</div>
                    <div class="progress-actions">
                        <button type="button" id="cancelProcessing" class="btn btn-sm btn-outline-danger" style="display: none;">
                            ⏹️ 取消处理
                        </button>
                    </div>
                </div>
            </div>

            <!-- 处理结果区域 -->
            <div id="results-area" style="display: none;" class="results-container">
                <div class="results-header">
                    <span>📊 处理结果</span>
                </div>
                <table id="results-table" class="table table-hover">
                    <thead>
                        <tr>
                            <th>源文件</th>
                            <th>结果文件</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Results will be inserted here by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div> <!-- end main-content -->
    </div> <!-- end container -->

    <!-- 目录浏览器模态框 -->
    <div id="directory-browser-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content directory-browser">
            <div class="modal-header">
                <h3>📁 选择目录</h3>
                <button type="button" class="modal-close-btn" onclick="closeDirectoryBrowser()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="browser-toolbar">
                    <div class="current-path">
                        <span class="path-label">当前路径:</span>
                        <span id="browser-current-path" class="path-value">-</span>
                    </div>
                    <div class="browser-actions">
                        <button type="button" class="btn btn-sm btn-secondary" id="browser-back-btn" onclick="goBack()" style="display: none;">
                            ⬅️ 返回上级
                        </button>
                        <button type="button" class="btn btn-sm btn-secondary" onclick="refreshDirectory()">
                            🔄 刷新
                        </button>
                    </div>
                </div>
                <div class="directory-list" id="directory-list">
                    <!-- 目录列表将在这里渲染 -->
                </div>
                <div class="direct-input-section">
                    <label for="direct-path-input">或直接输入路径:</label>
                    <input type="text" id="direct-path-input" placeholder="输入目录路径..." class="form-control">
                    <button type="button" class="btn btn-sm btn-primary" onclick="goToDirectPath()">前往</button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeDirectoryBrowser()">取消</button>
                <button type="button" class="btn btn-primary" id="select-directory-btn" onclick="selectDirectory()" disabled>选择此目录</button>
            </div>
        </div>
    </div>

    <!-- JS 文件（按依赖顺序加载） -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/state.js"></script>
    <script src="/static/js/components/provider-panel.js"></script>
    <script src="/static/js/components/prompt-panel.js"></script>
    <script src="/static/js/components/task-progress.js"></script>
    <script src="/static/js/components/directory-browser.js"></script>
    <script src="/static/js/components/trash-panel.js"></script>
    <script src="/static/js/components/settings-panel.js"></script>
    <script src="/static/js/components/result-table.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
